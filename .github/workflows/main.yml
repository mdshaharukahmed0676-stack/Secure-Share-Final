name: Unzip and Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ১. জিপ ফাইল আনজিপ করে সব ফাইল মেইন ডিরেক্টরিতে আনা
      - name: Unzip Source Code
        run: |
          unzip secure-share.zip -d extracted_files
          cp -r extracted_files/* . || true
          cp -r extracted_files/.* . || true

      # ২. জাভা ১৭ সেটআপ (গ্র্যাডেল রান করার জন্য এটি দরকার)
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ৩. গিটহাবের অফিশিয়াল গ্র্যাডেল সেটআপ টুল (যা নিজে থেকেই সঠিক ম্যাচিং ফাইল তৈরি করে নেবে)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      # ৪. ফ্রেস পারমিশন সেটআপ
      - name: Grant Execute Permission for Gradlew
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      # ৫. অ্যাপ বিল্ড করা
      - name: Build APK
        run: ./gradlew assembleDebug

      # ৬. তৈরি হওয়া APK ফাইলটি আপলোড করা
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: secure-share-app
          path: app/build/outputs/apk/debug/app-debug.apk
