name: Unzip and Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ১. জিপ ফাইল আনজিপ করে সব ফাইল মেইন ডিরেক্টরিতে আনা
      - name: Unzip Source Code
        run: |
          unzip secure-share.zip -d extracted_files
          cp -r extracted_files/* . || true
          cp -r extracted_files/.* . || true

      # ২. জাভা ১৭ সেটআপ
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ৩. মিসিং ডেবাগ কি-স্টোর ফাইলটি সার্ভারে অটো-জেনারেট করা
      - name: Generate Debug Keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          # প্রজেক্ট রুট এবং সাব-ফোল্ডারেও কপি করে দেওয়া যেন কোনোভাবেই মিস না হয়
          cp ~/.android/debug.keystore .
          cp ~/.android/debug.keystore ./app/ || true

      # ৪. গিটহাবের অফিশিয়াল গ্র্যাডেল সেটআপ টুল
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      # ৫. গ্র্যাডেল র‍্যাপার তৈরি ও পারমিশন
      - name: Grant Execute Permission for Gradlew
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      # ৬. অ্যাপ বিল্ড করা
      - name: Build APK
        run: ./gradlew assembleDebug

      # ७. তৈরি হওয়া APK ফাইলটি আপলোড করা
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: secure-share-app
          path: app/build/outputs/apk/debug/app-debug.apk
