name: Unzip and Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # গিটহাব নিজে জিপ ফাইলটি আনজিপ করে সঠিক স্ট্রাকচারে সাজিয়ে নেবে
      - name: Unzip Source Code
        run: |
          unzip secure-share.zip -d extracted_files
          mv extracted_files/*/* . || mv extracted_files/* . || true
          chmod +x gradlew

      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: secure-share-app
          path: app/build/outputs/apk/debug/app-debug.apk
