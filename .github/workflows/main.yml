name: Unzip and Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ১. জিপ ফাইল আনজিপ করে সব ফাইল মেইন ডিরেক্টরিতে আনা
      - name: Unzip Source Code
        run: |
          unzip secure-share.zip -d extracted_files
          cp -r extracted_files/* . || true
          cp -r extracted_files/.* . || true

      # ২. আপনার প্রজেক্টের জন্য পারফেক্ট জাভা ১১ সেটআপ করা
      - name: set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # ৩. প্রজেক্টের সাথে ম্যাচিং গ্র্যাডেল ভার্সন দিয়ে র‍্যাপার তৈরি করা
      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 7.5
          chmod +x gradlew

      # ৪. অ্যাপ বিল্ড করা
      - name: Build APK
        run: ./gradlew assembleDebug

      # ৫. তৈরি হওয়া APK ফাইলটি আপলোড করা
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: secure-share-app
          path: app/build/outputs/apk/debug/app-debug.apk
